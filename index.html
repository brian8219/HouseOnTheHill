<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帶有超連結的動態網頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 320px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
            font-size: 16px;
            color: #333;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #2196F3;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #e3f2fd;
            border-left: 5px solid #2196F3;
            border-radius: 4px;
            font-size: 15px;
            color: #0d47a1;
            line-height: 1.6;
        }
        /* 新增：超連結的樣式 */
        .result-box a {
            color: #1565c0;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed #1565c0;
        }
        .result-box a:hover {
            color: #0d47a1;
            border-bottom: 1px solid #0d47a1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>請選擇您的喜好</h2>
        
        <div class="form-group">
            <label for="category">類別：</label>
            <select id="category" name="category">
                <option value="">-- 請選擇類別 --</option>
                <option value="food">美食佳餚</option>
                <option value="travel">旅遊景點</option>
                <option value="movie">電影娛樂</option>
            </select>
        </div>

        <div class="form-group">
            <label for="time">偏好時間：</label>
            <select id="time" name="time">
                <option value="">-- 請選擇時間 --</option>
                <option value="morning">平日白天</option>
                <option value="evening">下班晚上</option>
                <option value="weekend">週末假日</option>
            </select>
        </div>

        <div id="result" class="result-box">
            請選擇上方選項以查看推薦資訊。
        </div>
    </div>

    <script>
        const categorySelect = document.getElementById('category');
        const timeSelect = document.getElementById('time');
        const resultDiv = document.getElementById('result');

        // 修改：在文字中直接嵌入 HTML 的 <a> 標籤
        // target="_blank" 可以讓使用者點擊時自動開啟新分頁
        const recommendations = {
            'food-morning': '🍳 推薦早餐：來份澎湃的早午餐吧！看看 <a href="Survivor001.md" target="_blank">生活地圖</a> 找附近的店。',
            'food-evening': '🍻 推薦晚餐：下班適合聚餐，點此查看 <a href="Survivor001.md" target="_blank">美食推薦網</a>。',
            'food-weekend': '🍰 推薦週末：去網美咖啡廳打卡！參考 <a href="Survivor001.md" target="_blank">Instagram 熱門美食</a>。',
            
            'travel-morning': '⛰️ 推薦景點：早上爬山空氣好，出發前先查 <a href="Survivor001.md" target="_blank">中央氣象署天氣</a>。',
            'travel-evening': '🌌 推薦夜遊：晚上來看夜景，到 <a href="Survivor001.md" target="_blank">Google Maps</a> 搜尋附近的觀景台。',
            'travel-weekend': '🚗 推薦遠遊：週末適合度假，上 <a href="Survivor001.md" target="_blank">Booking.com</a> 訂房準備出發。',
            
            'movie-morning': '🎬 推薦早場：早場電影最舒適，去 <a href="Survivor001.md" target="_blank">Yahoo電影戲劇</a> 查時刻表。',
            'movie-evening': '🍿 推薦夜場：下班看電影放鬆，用 <a href="Survivor001.md" target="_blank">Netflix</a> 線上觀看。',
            'movie-weekend': '📺 推薦週末：週末在家躺著看劇，到 <a href="Survivor001.md" target="_blank">YouTube</a> 找免費強檔。'
        };

        function updateText() {
            const categoryValue = categorySelect.value;
            const timeValue = timeSelect.value;

            if (categoryValue && timeValue) {
                const combinedKey = `${categoryValue}-${timeValue}`;
                
                if (recommendations[combinedKey]) {
                    // 使用 innerHTML 才能把 <a> 標籤解析成真正的超連結，如果用 textContent 會變成純文字
                    resultDiv.innerHTML = recommendations[combinedKey];
                } else {
                    resultDiv.innerHTML = '查無特定的推薦資訊。';
                }
            } else {
                resultDiv.innerHTML = '請完成兩個選單的選擇。';
            }
        }

        categorySelect.addEventListener('change', updateText);
        timeSelect.addEventListener('change', updateText);
    </script>

</body>
</html>
